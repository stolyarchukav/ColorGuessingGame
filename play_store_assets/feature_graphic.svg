<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="1024" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#006C4C"/>
      <stop offset="1" stop-color="#004D36"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg_grad)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="150" r="100" fill="#FF5252" fill-opacity="0.2"/>
  <circle cx="874" cy="350" r="120" fill="#448AFF" fill-opacity="0.2"/>
  <circle cx="100" cy="400" r="80" fill="#69F0AE" fill-opacity="0.2"/>

  <!-- App Title Placeholder (Centered) -->
  <text x="512" y="250" font-family="sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Color Guessing Game</text>
  <text x="512" y="320" font-family="sans-serif" font-size="32" fill="#69F0AE" text-anchor="middle">Test your logic and intuition</text>

  <!-- Icon Elements in the corner -->
  <g transform="translate(850, 50) scale(0.8)">
    <circle cx="40" cy="40" r="15" fill="#FF5252"/>
    <circle cx="80" cy="40" r="15" fill="#448AFF"/>
    <circle cx="60" cy="70" r="15" fill="#69F0AE"/>
  </g>
</svg>